  <path d="M 5 232 C 20 226, 38 228, 42 232 L 38 268 C 26 264, 12 264, 8 268 Z" fill="#FAF3E0" stroke="#C8B400" stroke-width="2"/>
  <path d="M 42 232 C 46 228, 60 228, 72 232 L 68 268 C 58 266, 46 266, 42 268 Z" fill="#FAF3E0" stroke="#C8B400" stroke-width="2"/>
  <!-- Book spine -->
