  <!-- Book lines (text) -->
  <line x1="12" y1="244" x2="36" y2="242" stroke="#DDD" stroke-width="1.5"/>
  <line x1="12" y1="250" x2="36" y2="249" stroke="#DDD" stroke-width="1.5"/>
  <line x1="12" y1="256" x2="36" y2="255" stroke="#DDD" stroke-width="1.5"/>
  <line x1="12" y1="262" x2="28" y2="261" stroke="#DDD" stroke-width="1.5"/>
  <line x1="46" y1="242" x2="68" y2="240" stroke="#DDD" stroke-width="1.5"/>
  <line x1="46" y1="248" x2="68" y2="248" stroke="#DDD" stroke-width="1.5"/>
  <line x1="46" y1="254" x2="68" y2="254" stroke="#DDD" stroke-width="1.5"/>
  <text x="24" y="240" text-anchor="middle" fill="#2D6A4F" font-size="5" font-weight="bold">NUTRITION</text>
  <text x="57" y="237" text-anchor="middle" fill="#2D6A4F" font-size="5" font-weight="bold">SCIENCE</text>

  <!-- Right arm: raised with pencil -->
  <path d="M 200 218 C 222 214, 238 205, 244 195"
        fill="#FFD700" stroke="#C0A000" stroke-width="2.5"/>
  <ellipse cx="246" cy="191" rx="10" ry="8" fill="#FFE066" stroke="#C0A000" stroke-width="1.5" transform="rotate(-25, 246, 191)"/>
  <!-- Pencil -->
  <rect x="244" y="162" width="8" height="34" rx="2" fill="#FFD700" stroke="#C8A000" stroke-width="1" transform="rotate(20, 248, 180)"/>
  <path d="M 251 154 L 255 162 L 247 162 Z" fill="#E74C3C"/>
  <path d="M 248 153 L 252 160 L 249 160 Z" fill="#D5D5D5"/>
  <rect x="244" y="190" width="8" height="5" rx="1" fill="#D4A800" transform="rotate(20, 248, 192)"/>

  <!-- Legs -->
  <path d="M 118 292 C 115 310, 113 325, 111 335" fill="#FFD700" stroke="#C0A000" stroke-width="3"/>
  <ellipse cx="108" cy="339" rx="15" ry="7" fill="#FFE066" stroke="#C0A000" stroke-width="1.5"/>
  <path d="M 158 292 C 161 310, 163 325, 165 335" fill="#FFD700" stroke="#C0A000" stroke-width="3"/>
  <ellipse cx="168" cy="339" rx="15" ry="7" fill="#FFE066" stroke="#C0A000" stroke-width="1.5"/>
  <ellipse cx="108" cy="342" rx="15" ry="6" fill="#1B4332"/>
  <ellipse cx="168" cy="342" rx="15" ry="6" fill="#1B4332"/>

  <!-- Thought bubble -->
  <circle cx="218" cy="75" r="3" fill="white" opacity="0.7"/>
  <circle cx="228" cy="65" r="5" fill="white" opacity="0.75"/>
  <circle cx="242" cy="52" r="8" fill="white" opacity="0.8"/>
  <circle cx="258" cy="40" r="14" fill="white" opacity="0.85"/>
  <!-- Content of thought: nutrition symbol -->
  <text x="258" y="44" text-anchor="middle" font-size="14">🥗</text>
