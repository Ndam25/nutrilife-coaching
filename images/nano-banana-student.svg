  <!-- Graduation cap -->
  <rect x="100" y="48" width="82" height="12" rx="4" fill="#1B4332"/>
  <!-- Cap top board -->
  <rect x="88" y="36" width="108" height="14" rx="4" fill="#1B4332" transform="rotate(-3, 140, 43)"/>
  <!-- Tassel -->
  <line x1="196" y1="40" x2="210" y2="68" stroke="#FFD700" stroke-width="2.5"/>
  <circle cx="210" cy="70" r="6" fill="#FFD700"/>
  <line x1="210" y1="74" x2="207" y2="86" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="210" y1="74" x2="213" y2="86" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="210" y1="74" x2="210" y2="87" stroke="#FFD700" stroke-width="1.5"/>

  <!-- Outfit: Casual sweater with kente trim -->
  <path d="M 85 210 C 95 205, 140 202, 195 208 L 192 272 C 182 277, 155 282, 140 282 C 125 282, 102 277, 97 272 Z"
