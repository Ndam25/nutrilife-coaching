  <path d="M 98 265 L 191 263 L 190 270 L 99 272 Z" fill="#FFD700"/>
  <path d="M 99 272 L 190 270 L 189 278 L 100 280 Z" fill="#C0392B"/>
  <!-- Collar -->
  <path d="M 120 210 L 140 230 L 160 210" fill="none" stroke="#74C69D" stroke-width="3" stroke-linejoin="round"/>

  <!-- Face — studious look -->
  <!-- Glasses -->
  <ellipse cx="112" cy="135" rx="20" ry="17" fill="none" stroke="#8B6914" stroke-width="3"/>
  <ellipse cx="168" cy="135" rx="20" ry="17" fill="none" stroke="#8B6914" stroke-width="3"/>
  <line x1="132" y1="133" x2="148" y2="133" stroke="#8B6914" stroke-width="3"/>
  <path d="M 92 129 C 88 126, 84 128, 84 132" fill="none" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <path d="M 188 129 C 192 126, 196 128, 196 132" fill="none" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <!-- Glass lens fill -->
  <ellipse cx="112" cy="135" rx="18" ry="15" fill="white" opacity="0.2"/>
  <ellipse cx="168" cy="135" rx="18" ry="15" fill="white" opacity="0.2"/>

  <!-- Eyes behind glasses -->
  <g transform="translate(112, 135)">
    <ellipse cx="0" cy="0" rx="10" ry="11" fill="white"/>
    <ellipse cx="0" cy="0" rx="7" ry="8" fill="#1A1A1A"/>
    <ellipse cx="-2" cy="-2" rx="3" ry="3" fill="#111"/>
    <ellipse cx="-4" cy="-4" rx="2" ry="2" fill="white" opacity="0.85"/>
    <path d="M -8 -10 C -5 -15, 1 -15, 4 -10" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(168, 135)">
