    <ellipse cx="0" cy="0" rx="7" ry="8" fill="#1A1A1A"/>
    <ellipse cx="-2" cy="-2" rx="3" ry="3" fill="#111"/>
    <ellipse cx="-4" cy="-4" rx="2" ry="2" fill="white" opacity="0.85"/>
    <path d="M -7 -10 C -4 -15, 2 -15, 5 -10" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Slight smirk/smile -->
  <path d="M 120 172 C 130 182, 155 183, 162 174" fill="none" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="140" cy="158" rx="5" ry="3.5" fill="#E6A800" opacity="0.65"/>
  <ellipse cx="137" cy="160" rx="2" ry="2.5" fill="#C8880A"/>
  <ellipse cx="143" cy="160" rx="2" ry="2.5" fill="#C8880A"/>

  <!-- Cheeks -->
  <ellipse cx="96" cy="168" rx="12" ry="8" fill="#FF8C8C" opacity="0.25"/>
  <ellipse cx="184" cy="168" rx="12" ry="8" fill="#FF8C8C" opacity="0.25"/>

