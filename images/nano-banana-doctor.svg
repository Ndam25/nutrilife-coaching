<?xml version="1.0" encoding="UTF-8"?>
<!-- Nano Banana — Doctor/Coaching Pose -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 360" width="280" height="360">
  <defs>
    <radialGradient id="bodyDoc" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="65%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4A800"/>
    </radialGradient>
  </defs>
  <ellipse cx="140" cy="352" rx="68" ry="10" fill="#2D6A4F" opacity="0.13"/>

  <!-- Body -->
  <path d="M 140 28 C 112 23, 72 58, 62 118 C 52 173, 68 228, 92 268 C 102 283, 118 293, 132 295 C 147 297, 162 293, 172 282 C 188 268, 198 248, 202 222 C 212 178, 210 130, 198 90 C 186 52, 165 22, 140 28 Z"
        fill="url(#bodyDoc)" stroke="#C0A000" stroke-width="2"/>
  <path d="M 140 38 C 120 35, 88 62, 78 110 C 70 152, 80 202, 102 242"
        fill="none" stroke="#FFF8DC" stroke-width="7" stroke-linecap="round" opacity="0.4"/>
  <path d="M 138 26 C 140 13, 148 6, 152 4 C 155 2, 157 5, 155 9 C 153 13, 148 18, 142 25"
        fill="#8B6914" stroke="#6B4F0E" stroke-width="1.5"/>
  <path d="M 130 293 C 127 305, 131 315, 134 319 C 137 322, 142 322, 144 319 C 147 315, 147 305, 145 295"
        fill="#8B6914" stroke="#6B4F0E" stroke-width="1.5"/>

  <!-- White coat -->
  <path d="M 78 205 C 85 200, 140 197, 200 203 L 197 275 C 188 280, 160 285, 145 285 C 130 285, 108 280, 102 275 Z"
        fill="#F8F9FA" stroke="#E0E0E0" stroke-width="1.5"/>
  <!-- Coat lapels -->
  <path d="M 130 205 L 120 230 L 140 228 Z" fill="#E8E8E8"/>
  <path d="M 155 204 L 165 229 L 145 228 Z" fill="#E8E8E8"/>
  <!-- Coat pocket -->
  <rect x="158" y="238" width="28" height="20" rx="4" fill="#ECEFF1" stroke="#DDD" stroke-width="1"/>
  <!-- Pens in pocket -->
  <line x1="163" y1="236" x2="163" y2="248" stroke="#2D6A4F" stroke-width="2" stroke-linecap="round"/>
  <line x1="170" y1="236" x2="170" y2="248" stroke="#E76F51" stroke-width="2" stroke-linecap="round"/>
  <!-- NutriLife badge -->
  <rect x="100" y="215" width="38" height="20" rx="4" fill="#2D6A4F"/>
  <text x="119" y="229" text-anchor="middle" fill="white" font-family="Arial" font-size="6.5" font-weight="bold">NutriLife MD</text>

  <!-- Face -->
  <g transform="translate(112, 138)">
    <ellipse cx="0" cy="0" rx="13" ry="15" fill="white"/>
    <ellipse cx="0" cy="0" rx="9" ry="11" fill="#1A1A1A"/>
    <ellipse cx="-3" cy="-3" rx="4" ry="4" fill="#111"/>
    <ellipse cx="-5" cy="-5" rx="2.5" ry="2.5" fill="white" opacity="0.9"/>
    <path d="M -12 -11 C -9 -17, -1 -18, 3 -13" fill="none" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(168, 138)">
    <ellipse cx="0" cy="0" rx="13" ry="15" fill="white"/>
    <ellipse cx="0" cy="0" rx="9" ry="11" fill="#1A1A1A"/>
    <ellipse cx="-3" cy="-3" rx="4" ry="4" fill="#111"/>
    <ellipse cx="-5" cy="-5" rx="2.5" ry="2.5" fill="white" opacity="0.9"/>
    <path d="M -11 -11 C -8 -17, 0 -18, 4 -13" fill="none" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Confident smile -->
  <path d="M 114 178 C 124 193, 158 193, 168 178" fill="none" stroke="#8B4513" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 118 181 C 126 191, 156 191, 164 181" fill="white"/>

  <!-- Nose -->
  <ellipse cx="140" cy="162" rx="5" ry="3.5" fill="#E6A800" opacity="0.65"/>
  <ellipse cx="137" cy="164" rx="2" ry="2.5" fill="#C8880A"/>
  <ellipse cx="143" cy="164" rx="2" ry="2.5" fill="#C8880A"/>

  <!-- Cheeks -->
  <ellipse cx="100" cy="173" rx="12" ry="8" fill="#FF8C8C" opacity="0.28"/>
  <ellipse cx="180" cy="173" rx="12" ry="8" fill="#FF8C8C" opacity="0.28"/>

  <!-- Stethoscope -->
  <path d="M 120 170 C 110 178, 100 188, 98 202 C 96 215, 102 228, 114 233 C 122 237, 132 233, 133 225"
        fill="none" stroke="#2D6A4F" stroke-width="4" stroke-linecap="round"/>
  <path d="M 160 170 C 170 178, 178 188, 176 202"
        fill="none" stroke="#2D6A4F" stroke-width="4" stroke-linecap="round"/>
  <circle cx="133" cy="225" r="11" fill="#1B4332" stroke="#2D6A4F" stroke-width="2"/>
  <circle cx="133" cy="225" r="7" fill="#40916C"/>
  <line x1="129" y1="225" x2="137" y2="225" stroke="white" stroke-width="2"/>
  <line x1="133" y1="221" x2="133" y2="229" stroke="white" stroke-width="2"/>
  <circle cx="120" cy="170" r="5" fill="#2D6A4F" stroke="#1B4332" stroke-width="1.5"/>
  <circle cx="160" cy="170" r="5" fill="#2D6A4F" stroke="#1B4332" stroke-width="1.5"/>

  <!-- Left arm: pointing/gesturing with clipboard -->
  <path d="M 82 215 C 62 220, 48 232, 42 246"
        fill="#FFD700" stroke="#C0A000" stroke-width="2.5"/>
  <ellipse cx="40" cy="250" rx="11" ry="8" fill="#FFE066" stroke="#C0A000" stroke-width="1.5"/>
  <!-- Clipboard -->
  <rect x="8" y="225" width="38" height="50" rx="4" fill="#F5F5DC" stroke="#C8B400" stroke-width="2"/>
  <rect x="18" y="219" width="18" height="10" rx="5" fill="#C0A000"/>
  <line x1="14" y1="240" x2="40" y2="240" stroke="#CCC" stroke-width="1.5"/>
  <line x1="14" y1="248" x2="40" y2="248" stroke="#CCC" stroke-width="1.5"/>
  <line x1="14" y1="256" x2="40" y2="256" stroke="#CCC" stroke-width="1.5"/>
  <line x1="14" y1="264" x2="32" y2="264" stroke="#CCC" stroke-width="1.5"/>
  <text x="27" y="237" text-anchor="middle" fill="#2D6A4F" font-size="5" font-weight="bold">MEAL PLAN</text>

  <!-- Right arm: raised/pointing upward -->
  <path d="M 200 215 C 220 208, 238 198, 244 185"
        fill="#FFD700" stroke="#C0A000" stroke-width="2.5"/>
  <ellipse cx="246" cy="181" rx="11" ry="8" fill="#FFE066" stroke="#C0A000" stroke-width="1.5" transform="rotate(-30, 246, 181)"/>
  <!-- Pointing finger -->
  <path d="M 249 174 C 248 168, 252 162, 256 163 C 259 164, 260 168, 258 173"
        fill="#FFE066" stroke="#C0A000" stroke-width="1.5"/>

  <!-- Legs -->
  <path d="M 118 292 C 115 310, 113 325, 111 335" fill="#FFD700" stroke="#C0A000" stroke-width="3"/>
  <ellipse cx="108" cy="339" rx="15" ry="7" fill="#FFE066" stroke="#C0A000" stroke-width="1.5"/>
  <path d="M 158 292 C 161 310, 163 325, 165 335" fill="#FFD700" stroke="#C0A000" stroke-width="3"/>
  <ellipse cx="168" cy="339" rx="15" ry="7" fill="#FFE066" stroke="#C0A000" stroke-width="1.5"/>
  <ellipse cx="108" cy="342" rx="15" ry="6" fill="#2D6A4F"/>
  <ellipse cx="168" cy="342" rx="15" ry="6" fill="#2D6A4F"/>

  <!-- Sparkles -->
  <g transform="translate(48, 78)" opacity="0.8">
    <path d="M 0 -8 L 1.5 -1.5 L 8 0 L 1.5 1.5 L 0 8 L -1.5 1.5 L -8 0 L -1.5 -1.5 Z" fill="#FFD700"/>
  </g>
  <g transform="translate(238, 90)" opacity="0.65">
    <path d="M 0 -5 L 1 -1 L 5 0 L 1 1 L 0 5 L -1 1 L -5 0 L -1 -1 Z" fill="#74C69D"/>
  </g>
</svg>
